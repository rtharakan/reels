<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reels — Meet People Through Films</title>
  <link rel="canonical" href="https://reels-kappa-rosy.vercel.app">
  <meta name="description" content="Reels matches people based on their real film taste. Link your Letterboxd profile and discover who shares your watchlist.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1c1917;
      color: #e7e5e4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .accent { color: #D4856A; }
    p { color: #a8a29e; margin-bottom: 1.5rem; font-size: 0.95rem; }
    a {
      display: inline-block;
      background: #D4856A;
      color: #1c1917;
      padding: 0.75rem 2rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="accent">Reels</span></h1>
    <p>Meet people through the films you love. Link your Letterboxd profile and discover who shares your watchlist.</p>
    <a href="https://reels-kappa-rosy.vercel.app">Open Reels</a>
  </div>
</body>
</html>
